<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackfeet Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .rotate-y-180 { transform: rotateY(180deg); }
        #card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 font-sans text-slate-800 relative">

    <!-- Container for dynamic audio elements -->
    <div id="audio-container" class="hidden"></div>

    <!-- Top Navigation / Add Button -->
    <div class="absolute top-6 right-6">
        <button id="btn-open-modal" class="p-3 rounded-full bg-white text-slate-600 shadow-sm border border-slate-200 hover:bg-[#ECA400] hover:text-white hover:border-[#ECA400] transition-colors focus:outline-none focus:ring-2 focus:ring-[#ECA400] focus:ring-offset-2" title="Add New Card">
            <i class="ph ph-plus text-2xl"></i>
        </button>
    </div>

    <!-- Header -->
    <div class="mb-8 text-center space-y-2">
        <h1 class="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">
            Blackfeet Language Cards
        </h1>
        <p class="text-slate-500 font-medium" id="card-counter">
            Loading database...
        </p>
    </div>

    <!-- Flashcard Area -->
    <div class="w-full max-w-lg h-80 cursor-pointer group perspective-1000" id="card-container">
        <div id="card-inner" class="relative w-full h-full transform-style-3d shadow-xl rounded-3xl">
            
            <!-- FRONT OF CARD (Blackfeet) -->
            <div class="absolute inset-0 w-full h-full backface-hidden bg-[#F0E5D1] rounded-3xl flex flex-col items-center justify-center border-4 border-[#2C1E16] overflow-hidden">
                
                <!-- Tribal Geometric Border Top -->
                <div class="absolute top-0 inset-x-0 h-16 pointer-events-none opacity-90">
                    <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 100 25">
                        <polygon points="40,0 60,0 50,15" fill="#ECA400" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="45,0 55,0 50,8" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="10,0 30,0 20,20" fill="#ECA400" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="13,0 27,0 20,15" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="5,0 15,0 10,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="25,0 35,0 30,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="70,0 90,0 80,20" fill="#ECA400" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="73,0 87,0 80,15" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="65,0 75,0 70,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="85,0 95,0 90,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                    </svg>
                </div>

                <!-- Tribal Geometric Border Bottom -->
                <div class="absolute bottom-0 inset-x-0 h-16 pointer-events-none opacity-90 rotate-180">
                    <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 100 25">
                        <polygon points="40,0 60,0 50,15" fill="#ECA400" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="45,0 55,0 50,8" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="10,0 30,0 20,20" fill="#ECA400" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="13,0 27,0 20,15" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="5,0 15,0 10,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="25,0 35,0 30,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="70,0 90,0 80,20" fill="#ECA400" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="73,0 87,0 80,15" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="65,0 75,0 70,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="85,0 95,0 90,7" fill="#C22026" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                    </svg>
                </div>

                <!-- Tribal Geometric Border Left -->
                <div class="absolute inset-y-0 left-0 w-8 pointer-events-none opacity-90">
                    <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 20 100">
                        <polygon points="0,15 20,25 0,35" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="0,65 20,75 0,85" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                    </svg>
                </div>

                <!-- Tribal Geometric Border Right -->
                <div class="absolute inset-y-0 right-0 w-8 pointer-events-none opacity-90">
                    <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 20 100">
                        <polygon points="20,15 0,25 20,35" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="20,65 0,75 20,85" fill="#005B9A" stroke="#2C1E16" stroke-width="0.5" stroke-linejoin="round"/>
                    </svg>
                </div>

                <!-- Front Content -->
                <div class="relative z-10 px-12 text-center flex flex-col items-center">
                    <h2 id="text-blackfeet" class="text-3xl md:text-4xl font-semibold text-center mb-6 text-[#2C1E16] leading-tight">
                        <i class="ph ph-spinner-gap animate-spin"></i>
                    </h2>
                    
                    <button id="play-btn-front" class="hidden w-16 h-16 items-center justify-center rounded-full transition-all duration-300 focus:outline-none border-2 border-[#2C1E16] text-[#2C1E16] bg-transparent hover:bg-[#ECA400]" title="Play Audio">
                        <i class="ph ph-speaker-high text-3xl"></i>
                    </button>
                    <div id="spacer-front" class="h-16 hidden"></div>
                </div>
                
                <p class="absolute bottom-6 text-[#2C1E16]/60 font-medium text-sm flex items-center gap-2">
                    <i class="ph ph-arrows-clockwise"></i> Click to flip
                </p>
            </div>

            <!-- BACK OF CARD (English) -->
            <div class="absolute inset-0 w-full h-full backface-hidden rotate-y-180 bg-[#FFF] rounded-3xl flex flex-col items-center justify-center text-[#2C1E16] shadow-inner border-4 border-[#2C1E16] overflow-hidden">
                
                <!-- Mountain Background Image -->
                <div id="bg-loading" class="absolute inset-0 w-full h-full flex flex-col items-center justify-center bg-[#F0E5D1] z-0">
                    <i class="ph ph-spinner-gap text-4xl animate-spin text-[#005B9A] mb-2"></i>
                    <span class="text-sm text-[#005B9A] font-medium animate-pulse">Painting background...</span>
                </div>
                <img id="bg-image" src="" alt="Mountain Landscape" class="absolute inset-0 w-full h-full object-cover z-0 hidden" />
                
                <!-- Light Overlay for text readability -->
                <div class="absolute inset-0 bg-white/70 backdrop-blur-[1px] z-0"></div>

                <!-- Content -->
                <div class="relative z-10 flex flex-col items-center justify-center p-8 w-full h-full">
                    <h2 id="text-english" class="text-3xl md:text-4xl font-medium text-center mb-8 leading-tight">
                        <i class="ph ph-spinner-gap animate-spin"></i>
                    </h2>
                    
                    <button id="play-btn-back" class="hidden w-16 h-16 items-center justify-center rounded-full transition-all duration-300 bg-white/60 backdrop-blur-sm text-[#2C1E16] hover:bg-white hover:text-[#005B9A] focus:outline-none border-2 border-[#2C1E16]/30 hover:border-[#005B9A] shadow-sm" title="Play Audio">
                        <i class="ph ph-speaker-high text-3xl"></i>
                    </button>
                    <div id="spacer-back" class="h-16 hidden"></div>

                    <p class="absolute bottom-6 text-[#2C1E16]/70 font-medium text-sm flex items-center gap-2">
                        <i class="ph ph-arrows-clockwise"></i> Click to flip
                    </p>
                </div>
            </div>

        </div>
    </div>

    <!-- Navigation Controls -->
    <div class="mt-10 flex items-center gap-6">
        <button id="btn-prev" class="p-3 rounded-full bg-white text-slate-600 shadow-sm border border-slate-200 hover:bg-slate-50 hover:text-[#005B9A] transition-colors focus:outline-none focus:ring-2 focus:ring-[#005B9A] focus:ring-offset-2" aria-label="Previous card">
            <i class="ph ph-arrow-left text-2xl"></i>
        </button>
        
        <div class="flex gap-2 flex-wrap justify-center max-w-[200px]" id="dots-container">
            <!-- Dots inserted via JS -->
        </div>

        <button id="btn-next" class="p-3 rounded-full bg-white text-slate-600 shadow-sm border border-slate-200 hover:bg-slate-50 hover:text-[#005B9A] transition-colors focus:outline-none focus:ring-2 focus:ring-[#005B9A] focus:ring-offset-2" aria-label="Next card">
            <i class="ph ph-arrow-right text-2xl"></i>
        </button>
    </div>

    <!-- Add Card Modal -->
    <div id="add-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 relative overflow-hidden border-2 border-[#2C1E16]">
            <!-- Decorative Modal Header -->
            <div class="absolute top-0 inset-x-0 h-2 bg-[#ECA400]"></div>
            
            <button id="btn-close-modal" class="absolute top-4 right-4 text-slate-400 hover:text-[#C22026] transition-colors">
                <i class="ph ph-x text-2xl"></i>
            </button>
            
            <h3 class="text-2xl font-bold text-[#2C1E16] mb-6">Add New Card</h3>
            
            <form id="add-card-form" class="space-y-4">
                <div>
                    <label for="input-blackfeet" class="block text-sm font-bold text-[#005B9A] uppercase tracking-wider mb-1">Blackfeet Word *</label>
                    <input type="text" id="input-blackfeet" required class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#005B9A] focus:border-transparent transition-all" placeholder="e.g. Oki">
                </div>
                
                <div>
                    <label for="input-english" class="block text-sm font-bold text-[#ECA400] uppercase tracking-wider mb-1">English Translation *</label>
                    <input type="text" id="input-english" required class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ECA400] focus:border-transparent transition-all" placeholder="e.g. Hello">
                </div>
                
                <div>
                    <label for="input-audio" class="block text-sm font-bold text-slate-500 uppercase tracking-wider mb-1">Audio URL (Optional)</label>
                    <input type="url" id="input-audio" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent transition-all" placeholder="https://raw.githubusercontent.com/...">
                    <p class="text-xs text-slate-400 mt-1">Paste a GitHub link to your .mp3 file here.</p>
                </div>
                
                <div class="pt-4">
                    <button type="submit" id="submit-card-btn" class="w-full py-4 bg-[#2C1E16] hover:bg-[#C22026] text-white rounded-xl font-bold text-lg transition-colors shadow-md disabled:opacity-50">
                        Save to Database
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Module Script for Firebase and Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Setup Firebase
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // State
        let flashcardsData = []; // Now starts empty!
        let currentIndex = 0;
        let isFlipped = false;
        let isPlaying = false;
        let bgGenerated = false;

        // DOM Elements
        const cardContainer = document.getElementById('card-container');
        const cardInner = document.getElementById('card-inner');
        const textBlackfeet = document.getElementById('text-blackfeet');
        const textEnglish = document.getElementById('text-english');
        const cardCounter = document.getElementById('card-counter');
        const dotsContainer = document.getElementById('dots-container');
        
        const playBtnFront = document.getElementById('play-btn-front');
        const playBtnBack = document.getElementById('play-btn-back');
        const spacerFront = document.getElementById('spacer-front');
        const spacerBack = document.getElementById('spacer-back');

        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        const modal = document.getElementById('add-modal');
        const btnOpenModal = document.getElementById('btn-open-modal');
        const btnCloseModal = document.getElementById('btn-close-modal');
        const addCardForm = document.getElementById('add-card-form');
        const submitBtn = document.getElementById('submit-card-btn');

        // Helper function to convert standard GitHub URLs to raw URLs automatically
        function sanitizeGithubUrl(url) {
            if (!url) return url;
            if (url.includes('github.com') && url.includes('/blob/')) {
                return url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
            }
            return url;
        }

        // Initialization
        async function init() {
            try {
                // 1. Authenticate with Firebase first
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // 2. Setup real-time listener
                onAuthStateChanged(auth, (user) => {
                    if (!user) return;
                    
                    const cardsRef = collection(db, 'artifacts', appId, 'public', 'data', 'flashcards');
                    
                    onSnapshot(cardsRef, (snapshot) => {
                        let cards = [];
                        snapshot.forEach(doc => {
                            let data = doc.data();
                            
                            // Automatically fix any standard GitHub links saved to the database 
                            // so the browser doesn't try to load an HTML page as an MP3!
                            if (data.audioUrl) {
                                data.audioUrl = sanitizeGithubUrl(data.audioUrl);
                            }
                            
                            cards.push({ id: doc.id, ...data });
                        });
                        
                        // Sort by when they were added
                        cards.sort((a, b) => a.timestamp - b.timestamp);
                        
                        if (cards.length === 0) {
                            // If DB is completely empty, seed it with your first 3 cards so you don't lose them!
                            seedInitialData(cardsRef);
                        } else {
                            flashcardsData = cards;
                            if (currentIndex >= flashcardsData.length) currentIndex = 0;
                            
                            syncAudioElements();
                            createDots();
                            renderCard(currentIndex);
                            
                            if (!bgGenerated) {
                                generateBackgroundImage();
                                bgGenerated = true;
                            }
                        }
                    }, (error) => {
                        console.error("Firestore error:", error);
                    });
                });
            } catch (err) {
                console.error("Initialization error:", err);
            }
        }

        async function seedInitialData(cardsRef) {
            const defaults = [
                { blackfeet: "Aahkitsimio'p niita'paisiksikimiyi", english: "Let's drink coffee.", audioUrl: "https://raw.githubusercontent.com/mt-daver/blackfeet-flashcards/0377b1ff4dc6586befc3ee1f2a93fbec708c5b91/eating_lets-drink-coffee.mp3", timestamp: 1 },
                { blackfeet: "Aahsikskanaotonni", english: "Pleasant morning.", audioUrl: "https://raw.githubusercontent.com/mt-daver/blackfeet-flashcards/0377b1ff4dc6586befc3ee1f2a93fbec708c5b91/greetings_pleasant-morning.mp3", timestamp: 2 },
                { blackfeet: "Áíkia'piiwa", english: "What's happening?", audioUrl: "
