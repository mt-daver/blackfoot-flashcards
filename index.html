<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackfooot Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .rotate-y-180 { transform: rotateY(180deg); }
        #card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 font-sans text-slate-800 relative">

    <!-- Container for dynamic audio elements -->
    <div id="audio-container" class="hidden"></div>

    <!-- Top Navigation / Add Button -->

            <i class="ph ph-plus text-2xl"></i>
        </button>
    </div>

    <!-- Header -->

            Blackfoot Language Cards
        </h1>
        <p class="text-slate-500 font-medium" id="card-counter">

        </p>
    </div>

                <!-- Tribal Geometric Border Top -->

                    <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 100 25">

                        <polygon points="45,0 55,0 50,8" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="10,0 30,0 20,20" fill="#ECA400" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>

                        <polygon points="70,0 90,0 80,20" fill="#ECA400" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="73,0 87,0 80,15" fill="#005B9A" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>

                        <polygon points="85,0 95,0 90,7" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>

                <!-- Tribal Geometric Border Bottom -->

                    <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 100 25">
                        <polygon points="40,0 60,0 50,15" fill="#ECA400" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="45,0 55,0 50,8" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="10,0 30,0 20,20" fill="#ECA400" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="13,0 27,0 20,15" fill="#005B9A" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="5,0 15,0 10,7" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="25,0 35,0 30,7" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="70,0 90,0 80,20" fill="#ECA400" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="73,0 87,0 80,15" fill="#005B9A" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="65,0 75,0 70,7" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>
                        <polygon points="85,0 95,0 90,7" fill="#C22026" stroke="#F0E5D1" stroke-width="0.5" stroke-linejoin="round"/>

                <!-- Tribal Geometric Border Left -->
                <div class="absolute inset-y-0 left-0 w-8 pointer-events-none opacity-90">
                    <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 20 100">

                    <h2 id="text-english" class="text-3xl md:text-4xl font-medium text-center mb-8 leading-tight">
                        <i class="ph ph-spinner-gap animate-spin"></i>

                    <button id="play-btn-back" class="hidden w-16 h-16 items-center justify-center rounded-full transition-all duration-300 bg-white/20 backdrop-blur-sm text-[#F0E5D1] hover:bg-white hover:text-[#2C1E16] focus:outline-none border-2 border-[#F0E5D1]/30 hover:border-[#F0E5D1] shadow-sm" title="Play Audio">

    <!-- Navigation Controls -->

            <i class="ph ph-arrow-left text-2xl"></i>
        </button>
        
        <div class="flex gap-2 flex-wrap justify-center max-w-[200px]" id="dots-container">
            <!-- Dots inserted via JS -->
        </div>

        <button id="btn-next" class="p-3 rounded-full bg-white text-slate-600 shadow-sm border border-slate-200 hover:bg-slate-50 hover:text-[#005B9A] transition-colors focus:outline-none focus:ring-2 focus:ring-[#005B9A] focus:ring-offset-2" aria-label="Next card">

    <!-- Add Card Modal -->
    <div id="add-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 relative overflow-hidden border-2 border-[#2C1E16]">
            <!-- Decorative Modal Header -->
            <div class="absolute top-0 inset-x-0 h-2 bg-[#ECA400]"></div>
            
            <button id="btn-close-modal" class="absolute top-4 right-4 text-slate-400 hover:text-[#C22026] transition-colors">
                <i class="ph ph-x text-2xl"></i>
            </button>
            
            <h3 class="text-2xl font-bold text-[#2C1E16] mb-6">Test a New Card</h3>
            <p class="text-sm text-slate-500 mb-4 pb-4 border-b">Cards added here are temporary. To save them permanently, add them to your <code class="bg-slate-100 px-1 rounded">flashcards.json</code> file on GitHub!</p>
            
            <form id="add-card-form" class="space-y-4">
                <div>
                    <label for="input-blackfeet" class="block text-sm font-bold text-[#005B9A] uppercase tracking-wider mb-1">Blackfeet Word *</label>
                    <input type="text" id="input-blackfeet" required class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#005B9A] focus:border-transparent transition-all" placeholder="e.g. Oki">
                </div>
                
                <div>
                    <label for="input-english" class="block text-sm font-bold text-[#ECA400] uppercase tracking-wider mb-1">English Translation *</label>
                    <input type="text" id="input-english" required class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-[#ECA400] focus:border-transparent transition-all" placeholder="e.g. Hello">
                </div>
                
                <div>
                    <label for="input-audio" class="block text-sm font-bold text-slate-500 uppercase tracking-wider mb-1">Audio URL (Optional)</label>
                    <input type="url" id="input-audio" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent transition-all" placeholder="https://raw.githubusercontent.com/...">
                    <p class="text-xs text-slate-400 mt-1">Paste a GitHub link to your .mp3 file here.</p>
                </div>
                
                <div class="pt-4">
                    <button type="submit" id="submit-card-btn" class="w-full py-4 bg-[#2C1E16] hover:bg-[#C22026] text-white rounded-xl font-bold text-lg transition-colors shadow-md disabled:opacity-50">
                        Add to Deck (Temporary)
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script Logic -->
    <script>
        // =========================================================================
        // YOUR GITHUB JSON FILE URL 
        // We use the "raw" version to avoid CORS and HTML-parsing errors.
        // =========================================================================
        const GITHUB_JSON_URL = "https://raw.githubusercontent.com/mt-daver/blackfeet-flashcards/main/flashcards.json";

        // State
        let flashcardsData = [];
        let currentIndex = 0;
        let isFlipped = false;
        let isPlaying = false;

        // DOM Elements
        const cardContainer = document.getElementById('card-container');
        const cardInner = document.getElementById('card-inner');
        const textBlackfeet = document.getElementById('text-blackfeet');
        const textEnglish = document.getElementById('text-english');
        const cardCounter = document.getElementById('card-counter');
        const dotsContainer = document.getElementById('dots-container');
        
        const playBtnFront = document.getElementById('play-btn-front');
        const playBtnBack = document.getElementById('play-btn-back');
        const spacerFront = document.getElementById('spacer-front');
        const spacerBack = document.getElementById('spacer-back');

        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        const modal = document.getElementById('add-modal');
        const btnOpenModal = document.getElementById('btn-open-modal');
        const btnCloseModal = document.getElementById('btn-close-modal');
        const addCardForm = document.getElementById('add-card-form');
        const submitBtn = document.getElementById('submit-card-btn');

        // URL Sanitizer to ensure we are always hitting raw endpoints
        function sanitizeGithubUrl(url) {
            if (!url) return url;
            if (url.includes('github.com') && url.includes('/blob/')) {
                return url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
            }
            return url;
        }

        // Fisher-Yates Shuffle Algorithm
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Initialization
        async function init() {
            try {
                const targetUrl = sanitizeGithubUrl(GITHUB_JSON_URL);
                const response = await fetch(targetUrl);
                
                if (!response.ok) {
                    throw new Error("Could not load the JSON file.");
                }

                let data = await response.json();

                if (data.length === 0) {
                    document.getElementById('card-counter').innerHTML = `<span class="text-red-500 font-bold">No cards found in JSON.</span>`;
                    return;
                }

                // Randomize the cards immediately after loading
                flashcardsData = shuffleArray(data);

                syncAudioElements();
                createDots();
                renderCard(currentIndex);

            } catch (err) {
                console.error("Initialization error:", err);
                document.getElementById('card-counter').innerHTML = `<span class="text-red-500">Failed to load JSON link. Loading defaults.</span>`;
                
                const defaults = [
                    { id: 1, blackfeet: "Aahkitsimio'p niita'paisiksikimiyi", english: "Let's drink coffee.", audioUrl: "https://raw.githubusercontent.com/mt-daver/blackfeet-flashcards/0377b1ff4dc6586befc3ee1f2a93fbec708c5b91/eating_lets-drink-coffee.mp3" },
                    { id: 2, blackfeet: "Aahsikskanaotonni", english: "Pleasant morning.", audioUrl: "https://raw.githubusercontent.com/mt-daver/blackfeet-flashcards/0377b1ff4dc6586befc3ee1f2a93fbec708c5b91/greetings_pleasant-morning.mp3" },
                    { id: 3, blackfeet: "Áíkia'piiwa", english: "What's happening?", audioUrl: "https://raw.githubusercontent.com/mt-daver/blackfeet-flashcards/0377b1ff4dc6586befc3ee1f2a93fbec708c5b91/aikiapiiwa.mp3" }
                ];
                flashcardsData = shuffleArray(defaults);
                
                syncAudioElements();
                createDots();
                renderCard(currentIndex);
            }
        }

        function syncAudioElements() {
            const container = document.getElementById('audio-container');
            flashcardsData.forEach(card => {
                if (card.audioUrl) {
                    let audioEl = document.getElementById(`audio-${card.id}`);
                    if (!audioEl) {
                        audioEl = document.createElement('audio');
                        audioEl.id = `audio-${card.id}`;
                        audioEl.src = card.audioUrl;
                        audioEl.preload = 'auto';
                        audioEl.addEventListener('ended', () => {
                            isPlaying = false;
                            updatePlayButtonUI();
                        });
                        audioEl.addEventListener('error', (e) => {
                            console.error(`Failed to load audio for card ${card.blackfeet} from URL: ${card.audioUrl}`);
                        });
                        container.appendChild(audioEl);
                        audioEl.load();
                    } else if (audioEl.src !== card.audioUrl) {
                        audioEl.src = card.audioUrl;
                        audioEl.load();
                    }
                }
            });
        }

        function createDots() {
            dotsContainer.innerHTML = '';
            flashcardsData.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = `h-2.5 rounded-full transition-all duration-300 mb-2 ${idx === currentIndex ? 'w-8 bg-[#005B9A]' : 'w-2.5 bg-slate-200'}`;
                dotsContainer.appendChild(dot);
            });
        }

        function pauseAllAudio() {
            const allAudio = document.querySelectorAll('#audio-container audio');
            allAudio.forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });
        }

        function renderCard(index) {
            const card = flashcardsData[index];
            if (!card) return; 
            
            textBlackfeet.textContent = card.blackfeet;
            textEnglish.textContent = card.english;
            cardCounter.textContent = `Card ${index + 1} of ${flashcardsData.length}`;

            pauseAllAudio();
            isPlaying = false;
            updatePlayButtonUI();

            if (card.audioUrl) {
                playBtnFront.style.display = 'flex';
                playBtnBack.style.display = 'flex';
                spacerFront.style.display = 'none';
                spacerBack.style.display = 'none';
            } else {
                playBtnFront.style.display = 'none';
                playBtnBack.style.display = 'none';
                spacerFront.style.display = 'block';
                spacerBack.style.display = 'block';
            }

            Array.from(dotsContainer.children).forEach((dot, idx) => {
                dot.className = `h-2.5 rounded-full transition-all duration-300 mb-2 ${idx === currentIndex ? 'w-8 bg-[#005B9A]' : 'w-2.5 bg-slate-200'}`;
            });
        }

        function toggleFlip() {
            isFlipped = !isFlipped;
            if (isFlipped) {
                cardInner.classList.add('rotate-y-180');
            } else {
                cardInner.classList.remove('rotate-y-180');
            }
        }

        function handleNext(e) {
            if (e) e.stopPropagation();
            if (isFlipped) toggleFlip();
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % flashcardsData.length;
                renderCard(currentIndex);
            }, 150);
        }

        function handlePrev(e) {
            if (e) e.stopPropagation();
            if (isFlipped) toggleFlip();
            setTimeout(() => {
                currentIndex = (currentIndex - 1 + flashcardsData.length) % flashcardsData.length;
                renderCard(currentIndex);
            }, 150);
        }

        function updatePlayButtonUI() {
            const iconFront = playBtnFront.querySelector('i');
            const iconBack = playBtnBack.querySelector('i');

            if (isPlaying) {
                playBtnFront.className = "w-16 h-16 flex items-center justify-center rounded-full transition-all duration-300 bg-[#C22026] text-[#F0E5D1] shadow-lg scale-110 focus:outline-none border-2 border-[#C22026]";
                iconFront.className = "ph ph-speaker-high text-3xl animate-pulse";
                
                playBtnBack.className = "w-16 h-16 flex items-center justify-center rounded-full transition-all duration-300 bg-[#ECA400] text-white shadow-lg scale-110 focus:outline-none border-2 border-[#ECA400]";
                iconBack.className = "ph ph-speaker-high text-3xl animate-pulse";
            } else {
                playBtnFront.className = "w-16 h-16 flex items-center justify-center rounded-full transition-all duration-300 focus:outline-none border-2 border-[#2C1E16] text-[#2C1E16] bg-transparent hover:bg-[#ECA400]";
                iconFront.className = "ph ph-speaker-high text-3xl";

                playBtnBack.className = "w-16 h-16 flex items-center justify-center rounded-full transition-all duration-300 bg-white/10 backdrop-blur-sm text-[#F0E5D1] hover:bg-white hover:text-[#2C1E16] focus:outline-none border-2 border-[#F0E5D1]/30 hover:border-[#F0E5D1] shadow-sm";
                iconBack.className = "ph ph-speaker-high text-3xl";
            }
        }

        function toggleAudio(e) {
            e.stopPropagation();

            const card = flashcardsData[currentIndex];
            if (!card || !card.audioUrl) return;

            const currentAudioEl = document.getElementById(`audio-${card.id}`);
            if (!currentAudioEl) return;

            if (isPlaying) {
                currentAudioEl.pause();
                isPlaying = false;
                updatePlayButtonUI();
            } else {
                pauseAllAudio();
                currentAudioEl.currentTime = 0;
                
                currentAudioEl.play().then(() => {
                    isPlaying = true;
                    updatePlayButtonUI();
                }).catch(err => {
                    console.error(`Playback failed for URL: ${currentAudioEl.src}`, err);
                    isPlaying = false;
                    updatePlayButtonUI();
                });
            }
        }

        function openModal() {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            addCardForm.reset();
        }

        function handleAddCard(e) {
            e.preventDefault();
            
            const blackfeetText = document.getElementById('input-blackfeet').value.trim();
            const englishText = document.getElementById('input-english').value.trim();
            let audioUrlText = document.getElementById('input-audio').value.trim();

            if (!blackfeetText || !englishText) return;

            audioUrlText = sanitizeGithubUrl(audioUrlText);

            const newId = flashcardsData.length > 0 ? Math.max(...flashcardsData.map(c => c.id || 0)) + 1 : 1;

            const newCard = {
                id: newId,
                blackfeet: blackfeetText,
                english: englishText,
                audioUrl: audioUrlText || null
            };

            flashcardsData.push(newCard);
            
            closeModal();

            if (isFlipped) toggleFlip();
            setTimeout(() => {
                currentIndex = flashcardsData.length - 1;
                syncAudioElements();
                createDots();
                renderCard(currentIndex);
            }, 500);
        }

        cardContainer.addEventListener('click', toggleFlip);
        btnNext.addEventListener('click', handleNext);
        btnPrev.addEventListener('click', handlePrev);
        playBtnFront.addEventListener('click', toggleAudio);
        playBtnBack.addEventListener('click', toggleAudio);

        btnOpenModal.addEventListener('click', openModal);
        btnCloseModal.addEventListener('click', closeModal);
        addCardForm.addEventListener('submit', handleAddCard);
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        init();
    </script>
</body>
</html>
